<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AdaL — A Field Guide to AI Models</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080808;
      --pink: #FF5898;
      --text: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Poppins', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Force every text node inside the slides to use Inter (Poppins as fallback).
       The inline SVGs declare font-family on each <text> element; CSS overrides
       those when the rule lives on the SVG <text> selector. */
    .slide-canvas svg text,
    .slide-canvas svg tspan {
      font-family: 'Inter', 'Poppins', system-ui, sans-serif !important;
    }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 48px 24px 96px;
    }

    header {
      padding: 32px 0 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      margin-bottom: 48px;
    }

    header h1 {
      font-family: 'Inter', sans-serif;
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.8px;
      margin: 0 0 8px;
    }

    header p {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      margin: 0;
    }

    header .accent { color: var(--pink); }

    .carousel {
      display: flex;
      flex-direction: column;
      gap: 56px;
    }

    .slide {
      margin: 0;
    }

    .slide-canvas {
      width: 100%;
      max-width: 1080px;
      aspect-ratio: 4 / 5;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    .slide-canvas svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    figcaption {
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.45);
      text-align: center;
      margin-top: 16px;
    }

    footer {
      margin-top: 80px;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      text-align: center;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
    }
  </style>
</head>
